name: Daily Samsung Stock Report

on:
  schedule:
    # 한국 시간 오전 8시 = UTC 23시 (전날)
    - cron: '0 23 * * *'
  workflow_dispatch: # Actions 탭에서 수동 실행 가능

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: pip install yfinance pandas

      - name: 📊 분석 실행 & 이메일 발송
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python samsung_analysis.py
